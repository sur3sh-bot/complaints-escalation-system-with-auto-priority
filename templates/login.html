<!-- templates/login.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Login - Complaint System</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #f0f2f5, #c3cfe2); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 400px; 
            text-align: center; 
        }
        select, input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
        }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        button:hover { background: #0056b3; }

        .flash {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        #password-section { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>System Login</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <select name="role" id="roleSelect" onchange="togglePassword()">
            <option value="student">Student</option>
            <option value="admin">Administrator</option>
        </select>

        <div id="password-section">
            <input type="password" name="password" placeholder="Admin Password">
        </div>

        <button type="submit">Access Portal</button>
    </form>
</div>

<script>
function togglePassword() {
    let role = document.getElementById("roleSelect").value;
    document.getElementById("password-section").style.display =
        (role === "admin") ? "block" : "none";
}
</script>

</body>
</html>
